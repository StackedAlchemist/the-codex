<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tome Keeper — Book Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="books.css" />
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="bg-wrap">
    <div class="bg-main"></div>
    <div class="bg-fog fog-1"></div>
    <div class="bg-fog fog-2"></div>
  </div>

  <!-- NAV -->
  <nav class="tracker-nav">
    <a href="index.html" class="nav-back">← The Codex</a>
    <div class="nav-brand">📖 Tome Keeper</div>
    <div class="nav-actions">
      <button class="nav-btn" id="addBookBtn">+ Add Book</button>
    </div>
  </nav>

  <main class="tracker-main">

    <!-- HERO STATS -->
    <section class="stats-bar">
      <div class="stat-card">
        <span class="sc-num" id="statTotal">0</span>
        <span class="sc-label">Total Books</span>
      </div>
      <div class="stat-card highlight">
        <span class="sc-num" id="statConquered">0</span>
        <span class="sc-label">Conquered</span>
      </div>
      <div class="stat-card">
        <span class="sc-num" id="statProgress">0</span>
        <span class="sc-label">In Progress</span>
      </div>
      <div class="stat-card">
        <span class="sc-num" id="statDeck">0</span>
        <span class="sc-label">On Deck</span>
      </div>
      <div class="stat-card">
        <span class="sc-num" id="statLeft">0</span>
        <span class="sc-label">Left Behind</span>
      </div>
    </section>

    <!-- SEARCH -->
    <section class="search-section">
      <div class="section-label">🔍 Discover Books</div>
      <div class="search-row">
        <div class="search-wrap">
          <input type="text" id="bookSearch" class="search-input" placeholder="Search by title, author, or series…" autocomplete="off" />
          <button class="search-btn" id="searchBtn">Search</button>
        </div>
        <div class="quick-searches">
          <span class="qs-label">Quick:</span>
          <button class="qs-btn" data-q="Brandon Sanderson">Sanderson</button>
          <button class="qs-btn" data-q="Kyle Kirrin Shadeslinger">Ripple System</button>
          <button class="qs-btn" data-q="Craig Alanson Expeditionary Force">Expeditionary Force</button>
          <button class="qs-btn" data-q="Hunger Games Suzanne Collins">Hunger Games</button>
          <button class="qs-btn" data-q="Stormlight Archive">Stormlight</button>
          <button class="qs-btn" data-q="Mistborn Brandon Sanderson">Mistborn</button>
        </div>
      </div>
      <div class="search-results hidden" id="searchResults"></div>
    </section>

    <!-- MY SHELF -->
    <section class="shelf-section">
      <div class="shelf-header">
        <div class="section-label">📚 My Shelf</div>
        <div class="shelf-filters">
          <button class="sf-btn active" data-filter="all">All</button>
          <button class="sf-btn" data-filter="in-progress">In Progress</button>
          <button class="sf-btn" data-filter="on-deck">On Deck</button>
          <button class="sf-btn" data-filter="conquered">Conquered</button>
          <button class="sf-btn" data-filter="left-behind">Left Behind</button>
        </div>
        <div class="shelf-sort">
          <select id="shelfSort" class="sort-select">
            <option value="added">Recently Added</option>
            <option value="title">Title A–Z</option>
            <option value="rating">My Rating</option>
            <option value="author">Author</option>
          </select>
        </div>
      </div>
      <div class="shelf-grid" id="shelfGrid">
        <div class="empty-shelf" id="emptyShelf">
          <span class="empty-rune">📖</span>
          <p>Your shelf is empty. Search for a book and add it to begin.</p>
        </div>
      </div>
    </section>

    <!-- FEATURED SERIES -->
    <section class="series-section">
      <div class="section-label">⭐ Featured Series</div>
      <div class="series-grid" id="seriesGrid"></div>
    </section>

    <!-- UPCOMING -->
    <section class="upcoming-section">
      <div class="section-label">🗓 Upcoming Releases</div>
      <div class="upcoming-grid" id="upcomingGrid"></div>
    </section>

  </main>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-cover" id="modalCover"></div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle">Add Book</h2>
        <p class="modal-author" id="modalAuthor"></p>

        <div class="modal-field">
          <label class="field-label">Status</label>
          <div class="status-btns" id="statusBtns">
            <button class="status-btn" data-status="in-progress">In Progress</button>
            <button class="status-btn" data-status="on-deck">On Deck</button>
            <button class="status-btn active" data-status="conquered">Conquered</button>
            <button class="status-btn" data-status="left-behind">Left Behind</button>
          </div>
        </div>

        <div class="modal-field">
          <label class="field-label">My Rating</label>
          <div class="star-row" id="starRow">
            <span class="star" data-val="1">★</span>
            <span class="star" data-val="2">★</span>
            <span class="star" data-val="3">★</span>
            <span class="star" data-val="4">★</span>
            <span class="star" data-val="5">★</span>
          </div>
        </div>

        <div class="modal-field">
          <label class="field-label">My Notes</label>
          <textarea id="modalNotes" class="modal-textarea" placeholder="Thoughts, quotes, reactions…" rows="3"></textarea>
        </div>

        <div class="modal-field" id="progressField">
          <label class="field-label">Progress (page)</label>
          <input type="number" id="modalPage" class="modal-input" placeholder="Current page" min="0" />
        </div>

        <div class="modal-actions">
          <button class="modal-save" id="modalSave">Save to Shelf</button>
          <button class="modal-delete hidden" id="modalDelete">Remove</button>
        </div>
      </div>
    </div>
  </div>

  <script src="books.js"></script>
</body>
</html>
